<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NetAhoy</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #11151c;
            color: #eef3f8;
            font-family: system-ui, sans-serif;
        }

        body > canvas {
            position: fixed;
            inset: 0;
            display: block;
            width: 100vw !important;
            height: 100vh !important;
        }

        #status {
            position: fixed;
            left: 16px;
            bottom: 14px;
            z-index: 10;
            max-width: min(360px, calc(100vw - 32px));
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            background: rgba(17, 21, 28, 0.78);
            color: #dbe7f1;
            font-size: 13px;
            line-height: 1.35;
            pointer-events: none;
        }

        #status[hidden] {
            display: none;
        }
    </style>
</head>
<body>
    <div id="status">Starting NetAhoy...</div>
    <script type="module">
        import init from './wasm/ahoy_client.js';

        const status = document.getElementById('status');

        init()
            .then(() => {
                status.hidden = true;
            })
            .catch((error) => {
                console.error('Failed to initialize NetAhoy WASM', error);
                status.textContent = `Failed to initialize NetAhoy: ${error?.message || error}`;
            });
    </script>
</body>
</html>
